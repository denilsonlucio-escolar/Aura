{%extends 'base.html'%}

{% load static%}

{%block titulo%} Login {%endblock%}

{% block estilo %} <link rel="stylesheet" href="{% static 'assets/css/login.css' %}" /> {% endblock %}

{% block scripts %}  {% endblock %}


{%block conteudo%}

  <main class="login-area">
    <section class="login-container">

      <!-- LOGIN -->
      <div class="login-box">
        <h2>Já sou cliente</h2>

        <form id="form-login">
          <input type="text" placeholder="E-mail, CPF ou CNPJ" required>

          <div class="senha-input">
            <input type="password" placeholder="Senha" required>
            <span class="mostrar-senha">👁️</span>
          </div>

          <a href="#" class="link-senha">Esqueci minha senha</a>

          <button type="submit" class="botao primario">
            Acessar conta
          </button>

          <button type="button" class="botao secundario">
            Entrar sem senha
          </button>
        </form>
      </div>

      <div class="divisor"></div>

      <!-- CADASTRO -->
      <div class="cadastro-box">
        <h2>Criar conta</h2>

        <form id="form-cadastro">
          <input type="email" placeholder="Informe seu e-mail" required>

          <button type="submit" class="botao primario">
            Prosseguir
          </button>
        </form>
      </div>

    </section>
  </main>

{%endblock%}
