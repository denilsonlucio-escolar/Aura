{% extends 'base.html' %}

{% load static %}

{% block titulo %} Login {% endblock %}

{% block estilo %}
<link rel="stylesheet" href="{% static 'assets/css/login.css' %}" /> {% endblock %}

{% block scripts %} 
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const params = new URLSearchParams(window.location.search);

    if (params.get('cadastro') === 'sucesso') {
      const form = document.getElementById('form-login');

      const aviso = document.createElement('div');
      aviso.className = 'alerta alerta-sucesso';
      aviso.textContent = 'Cadastro realizado com sucesso! Faça login para continuar.';

      form.parentNode.insertBefore(aviso, form);
    }
  });
</script>
{% endblock %}

{% block conteudo %}

<main class="login-area">
  <section class="login-container">

    <!-- LOGIN -->
    <div class="login-box">
      <h2>Já sou cliente</h2>

      {% include 'mensagens.html' %}

      <form id="form-login" method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuário" required>

        <div class="senha-input">
          <input type="password" name="password" placeholder="Senha" required>
          <span class="mostrar-senha">👁️</span>
        </div>

        <a href="#" class="link-senha">Esqueci minha senha</a>

        <button type="submit" class="botao primario">
          Acessar conta
        </button>
      </form>
    </div>

  </section>
</main>

{% endblock %}
