{% load static %}


<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Aura</title>
  <link rel="stylesheet" href="{% static 'assets/css/perfil.css' %}" />
</head>

<body>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar">{{ user.username|slice:":2"|upper }}</div>
      <div>
        <div class="user-name"></div>
        <div class="user-role">Administrador</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <a href="{% url 'painel' %}" class="nav-item {% if pagina == 'painel' %}active{% endif %}"><span
          class="nav-icon">🏠</span> Inicial</a>
      <a href="{% url 'meus_dados' %}" class="nav-item {% if pagina == 'meus_dados' %}active{% endif %}"><span
          class="nav-icon">👤</span> Meus Dados</a>

      <div class="nav-section">Gerenciamento</div>
      <a href="{% url 'produtos' %}" class="nav-item {% if pagina == 'produtos' %}active{% endif %}"><span
          class="nav-icon">📚</span> Produtos </a>
      <a href="{% url 'usuarios' %}" class="nav-item {% if pagina == 'usuarios' %}active{% endif %}"><span
          class="nav-icon">🔑</span> Usuários</a>

      <div class="nav-section">Cadastro/Edição</div>
      <a href="{% url 'add_produtos' %}" class="nav-item {% if pagina == 'produtos_1' %}active{% endif %}"><span
          class="nav-icon">📚</span> Produtos </a>
      <a href="{% url 'add_usuario' %}" class="nav-item {% if pagina == 'usuarios_1' %}active{% endif %}"><span
          class="nav-icon">🔑</span> Usuários</a>

      <div class="nav-section">Sessão</div>
      <a href="{% url 'inicial' %}" class="nav-item "><span class="nav-icon">🏠</span> Home</a>
      <a href="{% url 'logout' %}" class="nav-item danger"><span class="nav-icon">🚪</span> Sair</a>
    </nav>

    <div class="sidebar-footer">IFRN AURA © 2026</div>
  </aside>

  <div class="topbar">
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="logo-text">IFRN AURA<span>Dashboard</span></div>
    <div class="avatar" style="width:36px;height:36px;font-size:1rem;">BG</div>
  </div>

  {% block conteudo %}
  {% endblock %}


  <script src="{% static 'assets/js/perfil.js' %}"></script>
</body>

</html>
